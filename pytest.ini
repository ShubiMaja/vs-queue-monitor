[pytest]
testpaths = tests
addopts = -ra
# Playwright: default browser is chromium; use `pytest --headed --slowmo 400` to watch tests run.
# Uvicorn uses websockets; upstream emits DeprecationWarnings until those libs align — hide in tests only.
filterwarnings =
    ignore::DeprecationWarning:websockets.legacy
    ignore::DeprecationWarning:websockets.server
    ignore::DeprecationWarning:websockets.legacy.server
    ignore::DeprecationWarning:uvicorn.protocols.websockets
