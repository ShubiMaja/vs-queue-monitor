<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-hidden="true">
  <!-- VS Queue Monitor brand mark: bold V (Vintage Story / queue direction) + position dots -->
  <rect width="128" height="128" rx="26" fill="#0f172a"/>
  <!-- Bold V chevron — reads as both the "VS" initial and a downward queue pointer -->
  <path d="M16 24 L64 86 L112 24" fill="none" stroke="#5794f2" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Queue position dots: two waiting, one active (you are here) -->
  <circle cx="36" cy="110" r="7" fill="#2e3742"/>
  <circle cx="64" cy="110" r="8.5" fill="#5794f2"/>
  <circle cx="92" cy="110" r="7" fill="#2e3742"/>
</svg>
